<style>
  :root{
    --gold:#f4b400; --gold-deep:#e08e00; --seed:#5a3a1a; --seed2:#7a4f24;
    --stem:#4e9a3a; --leaf:#5fb14a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    color:#3a3326;
    background:linear-gradient(160deg,#fff7e0,#ffe9c7,#ffe3ec,#e7f4ff,#fff7e0);
    background-size:400% 400%;
    animation:sky 30s ease infinite;
    min-height:100vh;
    min-height:100dvh; /* iOS: avoids the address-bar gap */
    display:flex;flex-direction:column;align-items:center;
    padding:calc(28px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));
    text-align:center;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    -webkit-font-smoothing:antialiased;
    touch-action:manipulation; /* removes 300ms tap delay & double-tap zoom */
  }
  @keyframes sky{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}

  header{max-width:560px;}
  h1{font-size:1.5rem;font-weight:700;margin:0 0 4px;letter-spacing:.3px;}
  .greet{font-size:1.05rem;color:#8a6d3b;margin:0 0 2px;font-weight:600;}
  .sub{font-size:.92rem;color:#9a8a66;margin:0 0 6px;line-height:1.45;}

  .stage{position:relative;width:300px;max-width:88vw;margin:6px auto 0;}
  svg{width:100%;height:auto;display:block;overflow:visible;}

  /* the tappable plant */
  #flower{cursor:pointer;transform-origin:150px 360px;transition:transform .25s ease;}
  #flower:hover{transform:rotate(-1.2deg) scale(1.015);}
  #flower.locked{cursor:default;}
  #flower.locked:hover{transform:none;}
  #flower:active{transform:rotate(0.5deg) scale(.99);}
  .head{transform-origin:150px 112px;animation:sway 6s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}

  .hint{
    margin:10px auto 0;min-height:1.4em;font-size:.95rem;font-weight:600;
    color:#cc8a1a;transition:opacity .4s;
  }
  .hint.soft{color:#a08bb5;}

  /* falling leaf animation overlay */
  .falling{
    position:absolute;left:50%;top:64%;width:54px;height:54px;
    pointer-events:none;z-index:5;
  }
  @keyframes fall{
    0%{transform:translate(-50%,0) rotate(0deg) scale(.7);opacity:0;}
    12%{opacity:1;}
    100%{transform:translate(var(--dx),320px) rotate(var(--rot)) scale(1);opacity:0;}
  }

  /* bouquet */
  .bouquet-wrap{margin-top:22px;width:100%;max-width:760px;}
  .count{font-size:.82rem;color:#a89876;letter-spacing:.4px;text-transform:uppercase;margin-bottom:12px;}
  .translate-btn{
    appearance:none;-webkit-appearance:none;
    border:1.5px solid #e3c98a;background:rgba(255,255,255,.6);
    color:#9a7a30;font:inherit;font-size:.82rem;font-weight:600;
    padding:9px 18px;border-radius:999px;cursor:pointer;
    margin-bottom:16px;transition:background .2s,transform .1s;
    min-height:44px; /* iOS minimum tap target */
    touch-action:manipulation;
  }
  .translate-btn:hover{background:rgba(255,255,255,.9);}
  .translate-btn:active{transform:scale(.96);}
  .bouquet{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;}
  .leaf{
    position:relative;
    width:200px;min-height:96px;
    padding:16px 18px 14px;
    border-radius:0 100% 0 100%/100% 0 100% 0;
    display:flex;flex-direction:column;justify-content:center;
    box-shadow:0 6px 18px rgba(120,90,30,.14);
    animation:pop .55s cubic-bezier(.2,1.3,.5,1) both;
    overflow:hidden;
  }
  .leaf::before{ /* central vein */
    content:"";position:absolute;left:14%;top:14%;width:72%;height:72%;
    background:linear-gradient(135deg,transparent 47%,rgba(255,255,255,.55) 49%,transparent 51%);
    pointer-events:none;
  }
  @keyframes pop{0%{transform:scale(.4) rotate(-8deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
  .leaf .msg{font-size:.95rem;line-height:1.4;font-weight:600;position:relative;z-index:1;}
  .leaf .foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;position:relative;z-index:1;}
  .leaf .date{font-size:.7rem;opacity:.7;font-weight:500;}
  .share-btn{
    appearance:none;-webkit-appearance:none;border:none;
    background:rgba(255,255,255,.5);color:inherit;font:inherit;
    font-size:.74rem;font-weight:700;
    display:inline-flex;align-items:center;gap:5px;
    padding:7px 12px;border-radius:999px;cursor:pointer;
    min-height:32px;transition:background .15s,transform .1s;
    touch-action:manipulation;
  }
  .share-btn:hover{background:rgba(255,255,255,.85);}
  .share-btn:active{transform:scale(.93);}
  .share-btn svg{width:13px;height:13px;}

  .toast{
    position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(18px);
    background:rgba(58,51,38,.93);color:#fff7e0;
    padding:11px 18px;border-radius:999px;font-size:.85rem;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;
    z-index:50;max-width:84vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  footer{margin-top:38px;font-size:.74rem;color:#bbac8b;}
</style>
</head>
<body>
  <header>
    <h1>Solsikken 🌻</h1>
    <p class="greet" id="greet"></p>
    <p class="sub">Tapp på solsikka og plukk ett blad. Ett om dagen, kom tilbake i morgen for et nytt.</p>
  </header>

  <div class="stage">
    <svg viewBox="0 0 300 380" id="art" aria-label="En solsikke">
      <defs>
        <radialGradient id="seedGrad" cx="50%" cy="42%" r="60%">
          <stop offset="0%" stop-color="#7a4f24"/>
          <stop offset="100%" stop-color="#3f2912"/>
        </radialGradient>
        <linearGradient id="petalGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffd23f"/>
          <stop offset="100%" stop-color="#f3a000"/>
        </linearGradient>
        <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6fc24f"/>
          <stop offset="100%" stop-color="#3f8a2e"/>
        </linearGradient>
      </defs>

      <g id="flower">
        <!-- stem -->
        <path d="M150 150 Q145 260 150 380" stroke="url(#stemGrad)" stroke-width="11" fill="none" stroke-linecap="round"/>
        <!-- leaves on stem -->
        <path id="stemLeafL" d="M150 250 Q95 232 80 270 Q120 286 150 258 Z" fill="#56a93f"/>
        <path id="stemLeafR" d="M150 300 Q205 282 222 322 Q180 336 150 308 Z" fill="#62b94a"/>
        <!-- flower head -->
        <g class="head">
          <g id="petals"></g>
          <circle cx="150" cy="112" r="44" fill="url(#seedGrad)"/>
          <g id="seeds"></g>
        </g>
      </g>
    </svg>
    <!-- falling leaves get injected here -->
  </div>

  <p class="hint" id="hint">Tapp solsikka 🌻</p>

  <div class="bouquet-wrap">
    <div class="count" id="count"></div>
    <button class="translate-btn" id="translateBtn" hidden>Vis på engelsk</button>
    <div class="bouquet" id="bouquet"></div>
  </div>

  <footer>Laget med varme 🌻</footer>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  "use strict";

  // ===== Optional analytics (GoatCounter) =====

  function gcLoad(){

  function gcEvent(path, title){

      window.goatcounter.count({ path: path, title: title, event: true });

  gcLoad();

  // --- Optimistic Norwegian lines about friendship & colour ---
  var MESSAGES = [
    "Noen vennskap er fargen himmelen får rett før den overrasker deg.",

    "Pass på lyset ditt: det er fint, og noen styrer etter det."
  ];

  // English translations, index-aligned with MESSAGES
  var MESSAGES_EN = [
    "Some friendships are the colour the sky turns right before it surprises you.",
    "You make the world a little more yellow, without even trying.",

    "You are worth a whole meadow of sunflowers.",
    "Hang in there: the finest colours often come last in the sky.",

    "There's more kindness around you than you can take in within a single day.",

    "The world is a little more colourful because you're in it.",
    "Someone is thinking warmly of you right now.",
    "Take care of your light: it's lovely, and someone steers by it."

  // Norwegian -> English lookup (by index)
  var NO2EN = {};
  for(var _i=0;_i<MESSAGES.length;_i++){ NO2EN[MESSAGES[_i]] = MESSAGES_EN[_i]; }

  // Cheerful hues for the leaves (HSL hue values)
  var HUES = [45, 18, 200, 280, 150, 332, 28, 175, 95, 260, 8, 215];

  var STORE_KEY = "solsikke_v1";
  var MONTHS = ["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];

  // --- helpers ---
  function todayKey(){
    var d = new Date();
    return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
  }
  function prettyDate(){
    var d = new Date();
    return d.getDate()+". "+MONTHS[d.getMonth()];
  }
  function load(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(raw){ return JSON.parse(raw); }
    }catch(e){}
    return {lastPull:null, collected:[], seen:[]};
  }
  function save(state){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
  }
  function param(name){
    try{ return new URLSearchParams(window.location.search).get(name); }catch(e){ return null; }

  var state = load();

  // --- greeting (optional ?til=Navn) ---

  if(til){
    til = til.replace(/[<>]/g,"").slice(0,40);
    document.getElementById("greet").textContent = "Til " + til + " 🌻";
  }

  // --- build petals & seeds ---
  function buildFlower(){

    for(var i=0;i<n;i++){
      var ang = (360/n)*i;
      var p = document.createElementNS("http://www.w3.org/2000/svg","ellipse");
      p.setAttribute("cx", cx);
      p.setAttribute("cy", cy-58);
      p.setAttribute("rx", 11);
      p.setAttribute("ry", 30);
      p.setAttribute("fill","url(#petalGrad)");
      p.setAttribute("transform","rotate("+ang+" "+cx+" "+cy+")");
      petals.appendChild(p);
    }
    var seeds = document.getElementById("seeds");
    for(var r=8;r<=36;r+=8){
      var count = Math.round(r*0.9);
      for(var j=0;j<count;j++){
        var a = (Math.PI*2/count)*j + r;
        var sx = cx + Math.cos(a)*r;
        var sy = cy + Math.sin(a)*r;
        var s = document.createElementNS("http://www.w3.org/2000/svg","circle");
        s.setAttribute("cx", sx.toFixed(1));
        s.setAttribute("cy", sy.toFixed(1));
        s.setAttribute("r", 1.7);
        s.setAttribute("fill", (j%2? "#7a4f24":"#90602e"));
        s.setAttribute("opacity","0.85");
        seeds.appendChild(s);
      }
    }
  }
  buildFlower();

  // --- pick a fresh message ---
  function pickMessage(){
    if(state.seen.length >= MESSAGES.length){ state.seen = []; }
    var available = [];
    for(var i=0;i<MESSAGES.length;i++){ if(state.seen.indexOf(i)===-1){ available.push(i); } }
    var idx = available[Math.floor(Math.random()*available.length)];
    state.seen.push(idx);
    return idx;
  }

  // --- render the bouquet ---
  var bouquetEl = document.getElementById("bouquet");
  var countEl = document.getElementById("count");
  var translateBtn = document.getElementById("translateBtn");
  var showEnglish = false;

  // text for a leaf in the currently selected language
  function textFor(item){
    if(showEnglish){ return NO2EN[item.msg] || item.msg; }
    return item.msg;
  }

  function updateCount(){
    var n = state.collected.length;
    if(n === 0){ countEl.textContent = ""; return; }
    countEl.textContent = showEnglish
      ? (n + (n === 1 ? " leaf in your bouquet" : " leaves in your bouquet"))
      : (n + " blad i buketten");
  }

  // brief confirmation message at the bottom of the screen
  var toastEl = document.getElementById("toast");
  var toastTimer = null;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    if(toastTimer){ clearTimeout(toastTimer); }
    toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 2800);
  }

  // share a leaf's message (native share sheet on mobile -> Snapchat etc.)
  function shareLeaf(item){
    gcEvent("shared-message", "Shared a message");
    var text = textFor(item) + "\n\n🌻";
    if(navigator.share){
      navigator.share({ text: text }).catch(function(){ /* user cancelled */ });
    }else if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){
        toast(showEnglish ? "Copied, paste it into Snapchat 🌻" : "Kopiert, lim inn i Snapchat 🌻");
      }).catch(function(){
        toast(showEnglish ? "Couldn't copy here" : "Fikk ikke kopiert her");
      });
    }else{
      toast(showEnglish ? "Sharing isn't supported here" : "Deling støttes ikke her");
    }
  }

  function leafColors(hue){
    return {
      bg: "hsl("+hue+",78%,90%)",
      bg2:"hsl("+hue+",70%,82%)",
      text:"hsl("+hue+",55%,26%)"
    };
  }

  function makeLeafEl(item, animate){
    var c = leafColors(item.hue);
    var div = document.createElement("div");
    div.className = "leaf";
    div.style.background = "linear-gradient(135deg,"+c.bg+","+c.bg2+")";
    div.style.color = c.text;
    if(!animate){ div.style.animation = "none"; }
    var msg = document.createElement("div");
    msg.className = "msg";
    msg.textContent = textFor(item);

    var foot = document.createElement("div");
    foot.className = "foot";
    var date = document.createElement("div");
    date.className = "date";
    date.textContent = item.dateLabel;
    var share = document.createElement("button");
    share.className = "share-btn";
    share.type = "button";
    share.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>';
    var label = document.createElement("span");
    label.textContent = showEnglish ? "Share" : "Del";
    share.appendChild(label);
    share.setAttribute("aria-label", showEnglish ? "Share this message" : "Del denne hilsenen");
    share.addEventListener("click", function(){ shareLeaf(item); });

    foot.appendChild(date);
    foot.appendChild(share);
    div.appendChild(msg);
    div.appendChild(foot);
    return div;
  }

  function renderBouquet(){
    bouquetEl.innerHTML = "";
    // newest first
    for(var i=state.collected.length-1;i>=0;i--){
      bouquetEl.appendChild(makeLeafEl(state.collected[i], false));
    }
    updateCount();
    translateBtn.hidden = state.collected.length === 0;
  }

  translateBtn.addEventListener("click", function(){
    showEnglish = !showEnglish;
    translateBtn.textContent = showEnglish ? "Vis på norsk" : "Vis på engelsk";
    renderBouquet();
  });

  renderBouquet();

  // --- lock state ---
  var flowerG = document.getElementById("flower");
  var hintEl = document.getElementById("hint");

  function isLockedToday(){ return state.lastPull === todayKey(); }

  function refreshHint(){
    if(isLockedToday()){
      flowerG.classList.add("locked");
      hintEl.classList.add("soft");
      hintEl.textContent = "Dagens blad er plukket, kom tilbake i morgen 🌻";
    }else{
      flowerG.classList.remove("locked");
      hintEl.classList.remove("soft");
      hintEl.textContent = "Tapp solsikka 🌻";
    }
  }
  refreshHint();

  // --- falling leaf animation ---
  var stage = document.querySelector(".stage");
  function flutterLeaf(hue, done){
    var c = leafColors(hue);
    var leaf = document.createElement("div");
    leaf.className = "falling";
    leaf.style.borderRadius = "0 100% 0 100%/100% 0 100% 0";
    leaf.style.background = "linear-gradient(135deg,"+c.bg+","+c.bg2+")";
    leaf.style.boxShadow = "0 6px 16px rgba(120,90,30,.2)";
    var dx = (Math.random()*120 - 60).toFixed(0) + "px";
    var rot = (Math.random()*240 - 120).toFixed(0) + "deg";
    leaf.style.setProperty("--dx", "calc(-50% + "+dx+")");
    leaf.style.setProperty("--rot", rot);
    leaf.style.animation = "fall 1.5s cubic-bezier(.3,.1,.4,1) forwards";
    stage.appendChild(leaf);
    setTimeout(function(){
      if(leaf.parentNode){ leaf.parentNode.removeChild(leaf); }
      done();
    }, 1450);
  }

  // --- the daily pull ---
  function pullLeaf(){
    if(isLockedToday()){
      // gentle nudge
      hintEl.classList.add("soft");
      hintEl.textContent = "Bare ett blad om dagen, vi sees i morgen 🌻";
      return;
    }
    var idx = pickMessage();
    var hue = HUES[state.collected.length % HUES.length];
    var item = { msg: MESSAGES[idx], hue: hue, dateLabel: prettyDate() };

    // little shake on the leaves
    var l = document.getElementById("stemLeafL");
    l.style.transition="transform .4s"; l.style.transform="rotate(-12deg)";
    setTimeout(function(){ l.style.transform=""; }, 420);

    flutterLeaf(hue, function(){
      state.collected.push(item);
      state.lastPull = todayKey();
      save(state);
      gcEvent("leaf-pulled", "Pulled a leaf");
      var el = makeLeafEl(item, true);
      bouquetEl.insertBefore(el, bouquetEl.firstChild);
      updateCount();
      translateBtn.hidden = false;
      refreshHint();
      el.scrollIntoView({behavior:"smooth", block:"nearest"});
    });
  }

  flowerG.addEventListener("click", pullLeaf);
  flowerG.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); pullLeaf(); } });
  flowerG.setAttribute("tabindex","0");
  flowerG.setAttribute("role","button");
  flowerG.setAttribute("aria-label","Plukk dagens blad");
})();
</script>
</body>
</html>
